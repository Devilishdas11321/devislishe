name: Connect to Runner via RDP (Fixed Bore Tunnel)
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Setup Windows RDP and Bore Tunnel
        run: |
          # 1. Set a password for the Windows User
          $Password = "DevilishTest123!"
          net user runneradmin $Password
          
          # 2. Download the free, open-source Bore tunnel app
          Write-Host "Downloading Bore Tunnel..." -ForegroundColor Cyan
          Invoke-WebRequest -Uri "https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-pc-windows-msvc.zip" -OutFile bore.zip
          Expand-Archive bore.zip -DestinationPath .
          
          # 3. Start the tunnel. We use cmd.exe to ensure BOTH stdout and stderr go to bore.log
          Write-Host "Starting tunnel..." -ForegroundColor Cyan
          Start-Process -FilePath "cmd.exe" -ArgumentList "/c .\bore.exe local 3389 --to bore.pub > bore.log 2>&1" -WindowStyle Hidden
          
          # 4. Read the log file in a loop until it connects
          Write-Host "Waiting for Bore to assign a port..." -ForegroundColor Cyan
          $port = $null
          $retryCount = 0
          
          while ($null -eq $port -and $retryCount -lt 15) {
              Start-Sleep -Seconds 2
              if (Test-Path "bore.log") {
                  $logContent = Get-Content "bore.log" -Raw
                  
                  # Bore usually outputs: "connected to server remote_port=XXXXX"
                  if ($logContent -match "remote_port=(\d+)") {
                      $port = $matches[1]
                  } 
                  # Fallback regex just in case
                  elseif ($logContent -match "bore\.pub:(\d+)") {
                      $port = $matches[1]
                  }
              }
              $retryCount++
          }
          
          # 5. Print the details so you can log in
          Write-Host ""
          Write-Host "=========================================" -ForegroundColor Green
          if ($port) {
              Write-Host " SUCCESS! Connect via Remote Desktop" -ForegroundColor Green
              Write-Host "=========================================" -ForegroundColor Green
              Write-Host "Computer : bore.pub:$port" -ForegroundColor Yellow
              Write-Host "Username : runneradmin" -ForegroundColor Yellow
              Write-Host "Password : $Password" -ForegroundColor Yellow
          } else {
              Write-Host " FAILED TO GET PORT" -ForegroundColor Red
              Write-Host "=========================================" -ForegroundColor Red
              Write-Host "Here is what the log file said:"
              if (Test-Path "bore.log") { Get-Content "bore.log" } else { Write-Host "No log file created." }
          }
          Write-Host "=========================================" -ForegroundColor Green
          
          # 6. Keep the runner alive for 1 hour so you have time to look around
          if ($port) {
              Write-Host "Runner is alive. Waiting for connection..."
              Start-Sleep -Seconds 3600
          }
