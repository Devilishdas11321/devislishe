name: Connect to Runner via RDP (No Account Needed)
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Setup Windows RDP and Bore Tunnel
        run: |
          # 1. Set a password for the Windows User
          $Password = "DevilishTest123!"
          net user runneradmin $Password
          
          # 2. Download the free, open-source Bore tunnel app
          Write-Host "Downloading Bore Tunnel..." -ForegroundColor Cyan
          Invoke-WebRequest -Uri "https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-pc-windows-msvc.zip" -OutFile bore.zip
          Expand-Archive bore.zip -DestinationPath .
          
          # 3. Start the tunnel on the RDP port (3389) in the background
          Write-Host "Starting tunnel..." -ForegroundColor Cyan
          Start-Process -FilePath ".\bore.exe" -ArgumentList "local 3389 --to bore.pub" -RedirectStandardOutput "bore.log" -NoNewWindow
          
          # Give it a few seconds to connect to the server
          Start-Sleep -Seconds 5
          
          # 4. Read the log file to find your connection port
          $logContent = Get-Content "bore.log"
          # Look for the port number assigned by the server
          $port = $null
          if ($logContent -match "listening at bore\.pub:(\d+)") {
              $port = $matches[1]
          }
          
          # 5. Print the details so you can log in
          Write-Host ""
          Write-Host "=========================================" -ForegroundColor Green
          if ($port) {
              Write-Host " SUCCESS! Connect via Remote Desktop" -ForegroundColor Green
              Write-Host "=========================================" -ForegroundColor Green
              Write-Host "Computer : bore.pub:$port" -ForegroundColor Yellow
              Write-Host "Username : runneradmin" -ForegroundColor Yellow
              Write-Host "Password : $Password" -ForegroundColor Yellow
          } else {
              Write-Host " FAILED TO START TUNNEL" -ForegroundColor Red
              Write-Host "Check the logs. bore.pub might be busy." -ForegroundColor Red
          }
          Write-Host "=========================================" -ForegroundColor Green
          
          # 6. Keep the runner alive for 1 hour so you have time to look around
          Write-Host "Runner is alive. Waiting for connection..."
          Start-Sleep -Seconds 3600
